<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Food Donation System</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Animated background elements */
        .bg-animation {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s ease-in-out infinite;
        }

        .bg-animation:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: -100px;
            right: -50px;
            animation: float 18s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(30px) translateX(20px); }
        }

        .login-container {
            background: white;
            padding: 45px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            color: #ff9800;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 15px;
        }

        .credentials-info {
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.1), rgba(255, 107, 0, 0.1));
            border-left: 4px solid #ff9800;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #555;
        }

        .credentials-info strong {
            color: #ff9800;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .credentials-item {
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .credentials-item code {
            background: rgba(0, 0, 0, 0.05);
            padding: 3px 8px;
            border-radius: 4px;
            color: #d32f2f;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: #ff9800;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }

        input::placeholder {
            color: #bbb;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c62828;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff9800, #ff6f00);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        .loading {
            display: none;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo-text {
                font-size: 26px;
            }

            .logo-subtitle {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="bg-animation"></div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo-text">Food Donation</div>
            <div class="logo-subtitle">Administration System</div>
            <div class="security-badge">
                
                <span>Secure Login</span>
            </div>
        </div>

        <form method="POST" id="adminLoginForm">
            {% csrf_token %}
            
            {% if error %}
                <div class="error-message show">{{ error }}</div>
            {% endif %}

           

            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="submit-btn">
                <span>Login to Admin Panel</span>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </button>

            {% if messages %}
                <div class="error-message show">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        </form>

        <div>
<a style="justify-content: right;" href="/" class="back-link">Back to Home</a>
        </div>
        
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            const loading = document.getElementById('loading');
            const button = this.querySelector('.submit-btn');
            loading.style.display = 'block';
            button.style.opacity = '0.8';
        });
    </script>
   
</body>
</html>
